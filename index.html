    <div class="stack">
        <header>
            <div class="marquee">
                <div id="titles">
                    <h1 class="title fx-title" data-text="Techniplayer">Techniplayer</h1>
                    <h1 class="title fx-title" data-text="Techniplayer">Techniplayer</h1>
                    <h1 class="title fx-title" data-text="Techniplayer">Techniplayer</h1>
                </div>
            </div>
        </header>
        <main class="container glass-card">
            <div id="player">
                <img id="song-cover" alt="Song Cover">
                <section id="meta">
                    <div id="title-wrap" class="collapser">
                        <h2 id="song-title"></h2>
                    </div>
                    <div id="user-wrap" class="collapser">
                        <div id="uploader">
                            <p id="song-author"></p>
                            <p id="song-adder" class="pill">
                                <img src="assets/user.svg">
                            </p>
                            <p id="song-plays" class="pill">
                                <img src="assets/note.svg">
                            </p>
                        </div>
                    </div>
                    <div id="song-controls" class="glass-card">
                        <div class="playback">
                            <div id="elapsed" class="time">0:00</div>
                            <input type="range" id="seek" min="0" max="224" value="0">
                            <div id="remaining" class="time">-3:44</div>
                        </div>
                        <div class="buttons">
                            <button id="open-video" class="button" aria-label="Open video in new tab">
                                <a target="_blank">
                                    <img src="assets/open-vid.svg">
                                </a>
                            </button>
                            <div class="control-group">
                                <button id="prev-song-btn" class="button" aria-label="Go Back">
                                    <img src="assets/back-arrow.svg">
                                </button>
                                <button id="pause-btn" class="button" aria-label="Play/Pause Song" data-state="paused">
                                    <img src="assets/play.svg">
                                </button>
                                <button id="next-song-btn" class="button" aria-label="Skip Song">
                                    <img src="assets/forward-arrow.svg">
                                </button>
                            </div>
                            <button id="volume-button" class="button" aria-label="Volume">
                                <img src="assets/volume.svg">
                            </button>
                        </div>
                        <div id="history-wrap">
                            <button id="return-latest" class="button history-button">Wróć do ostatniego utworu</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="youtube-player"></div>

    <div id="notifications"></div>

    <script type="module" src="./js/main.js" defer></script>
</body>
</html>
